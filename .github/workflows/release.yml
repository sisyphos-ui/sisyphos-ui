name: Release

on:
  push:
    branches: [master, main]

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
      # `pnpm release` already runs `turbo run build --filter=./packages/*`
      # before `changeset publish`, so a standalone pre-build here is both
      # redundant and would drag the broken storybook dev app into scope.
      - uses: changesets/action@v1
        with:
          publish: pnpm release
          version: pnpm version-packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Two consumers of the same secret:
          #   - `NODE_AUTH_TOKEN` is what setup-node's generated `.npmrc`
          #     interpolates, so the actual `npm publish` call authenticates.
          #   - `NPM_TOKEN` is what `changesets/action` itself looks for to
          #     decide between token-mode and OIDC trusted publishing. Without
          #     it the action falls back to OIDC and fails with ENEEDAUTH on
          #     repos where trusted publishing isn't configured on npm's side.
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
