name: Bug report
description: Something is broken or behaves unexpectedly.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! A minimal reproduction helps us fix the issue faster — a [StackBlitz](https://stackblitz.com/fork/react-ts) or small public repo is ideal.

  - type: input
    id: package
    attributes:
      label: Affected package
      description: Which `@sisyphos-ui/*` package is this about?
      placeholder: "@sisyphos-ui/button"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: "0.2.0"
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Paste error messages verbatim.
    validations:
      required: true

  - type: input
    id: repro
    attributes:
      label: Reproduction link
      description: StackBlitz, CodeSandbox, or a public repo.
      placeholder: "https://stackblitz.com/..."

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: React version, bundler, browser, OS.
      placeholder: |
        - React 18.3
        - Vite 5.4
        - Chrome 130
        - macOS 15

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I have searched the existing issues.
          required: true
        - label: I have tested against the latest version of the affected package.
          required: true
